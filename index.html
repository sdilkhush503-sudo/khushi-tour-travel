<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Khushi Tour and Travel</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->

<nav>

<div class="logo">

Khushi Tour & Travel

</div>

<ul>

<li onclick="showSection('home')">Home</li>

<li onclick="showSection('booking')">Book Taxi</li>

<li onclick="showSection('services')">Services</li>

<li onclick="showSection('contact')">Contact</li>

</ul>

</nav>



<!-- HOME -->

<section id="home" class="section active">

<div class="hero">

<h1>Khushi Tour & Travel</h1>

<p>Owner: Shankar Lal Saini</p>

<p>Fast Safe Reliable Taxi Service</p>

<button onclick="showSection('booking')">

Book Your Taxi Now

</button>

</div>

</section>



<!-- BOOKING -->

<section id="booking" class="section">

<div class="booking-box">

<h2>Taxi Booking</h2>

<input id="name" placeholder="Full Name">

<input id="phone" placeholder="Phone Number">



<label>Pickup</label>

<input list="cities" id="pickup">

<label>Drop</label>

<input list="cities" id="drop">



<datalist id="cities">

<option value="Jaipur">

<option value="Delhi">

<option value="Agra">

<option value="Jodhpur">

<option value="Ajmer">

<option value="Udaipur">

<option value="Bikaner">

<option value="Kota">

<option value="Jaisalmer">

<option value="Pushkar">

<option value="Mathura">

<option value="Vrindavan">

</datalist>



<input type="date" id="date">



<select id="cartype">

<option value="10">Sedan</option>

<option value="14">SUV</option>

<option value="18">Innova</option>

<option value="25">Tempo Traveller</option>

</select>



<button onclick="calculateFare()">

Calculate Fare

</button>



<h3 id="fare"></h3>



<button class="whatsapp" onclick="sendWhatsApp()">

Book on WhatsApp

</button>



</div>

</section>



<!-- SERVICES -->

<section id="services" class="section">

<h2>Our Services</h2>

<div class="cards">

<div class="card">Jaipur to Delhi</div>

<div class="card">Jaipur to Agra</div>

<div class="card">Airport Pickup</div>

<div class="card">Outstation Taxi</div>

</div>

</section>



<!-- CONTACT -->

<section id="contact" class="section">

<h2>Contact</h2>

<p>Phone: +91 9785125935</p>

<p>Address: Jaipur Rajasthan</p>

</section>



<script src="script.js"></script>

</body>

</html>
