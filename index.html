<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khushi Tour & Travel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Khushi Tour & Travel</h1>
    </header>
    <main>
        <section class="service-cards">
            <div class="card" onclick="populateBookingForm('Route A', 'Details about Route A')" data-route="Route A">
                <h2>Service A</h2>
                <p>Description of Service A.</p>
            </div>
            <div class="card" onclick="populateBookingForm('Route B', 'Details about Route B')" data-route="Route B">
                <h2>Service B</h2>
                <p>Description of Service B.</p>
            </div>
            <div class="card" onclick="populateBookingForm('Route C', 'Details about Route C')" data-route="Route C">
                <h2>Service C</h2>
                <p>Description of Service C.</p>
            </div>
        </section>
        <section class="booking-form">
            <h2>Booking Form</h2>
            <form id="booking-form">
                <label for="route">Route:</label>
                <input type="text" id="route" name="route" readonly>
                <label for="details">Details:</label>
                <input type="text" id="details" name="details" readonly>
                <button type="submit">Book Now</button>
            </form>
        </section>
    </main>
    <script>
        function populateBookingForm(route, details) {
            document.getElementById('route').value = route;
            document.getElementById('details').value = details;
        }
    </script>
</body>
</html>
