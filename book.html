<!DOCTYPE html>
<html>

<head>

<title>Book Taxi</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h2>Book Taxi</h2>

</header>

<section class="section">

<form onsubmit="bookTaxi(); return false;">

<input type="text" placeholder="Full Name" required>

<input type="tel" placeholder="Phone Number" required>

<input type="text" placeholder="Pickup Location">

<input type="text" placeholder="Drop Location">

<input type="date">

<input type="time">

<input type="number" placeholder="Passengers">

<select>

<option>Select Car Type</option>

<option>Swift Dzire</option>

<option>Toyota Innova</option>

<option>Ertiga</option>

<option>Tempo Traveller</option>

</select>

<textarea placeholder="Special Request"></textarea>

<button class="btn">Book Taxi Now</button>

</form>

</section>

<script src="js/script.js"></script>

</body>

</html>
